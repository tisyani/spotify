<!DOCTYPE html>
<html>

<head>

    <title>Spotify Terminal</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <h1>Spotify Music Journal</h1>

    <!-- HISTORY WIDGETS -->
    <div id="history-container"></div>

    <!-- TERMINAL -->
    <div id="terminal">

        <div id="output"></div>

        <div id="input-line">

            <span>spotify@journal:~$</span>

            <input
                type="text"
                id="commandInput"
                autofocus
            >

        </div>

    </div>

    <script>

        const input =
            document.getElementById("commandInput");

        const output =
            document.getElementById("output");

        // =====================
        // SEND COMMAND
        // =====================

        input.addEventListener("keydown", async function(e) {

            if (e.key === "Enter") {

                const command = input.value;

                output.innerHTML += `
                    <p>
                        spotify@journal:~$ ${command}
                    </p>
                `;

                const response = await fetch("/command", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        command: command
                    })
                });

                const data = await response.json();

                if (data.result === "__CLEAR__") {

                    output.innerHTML = "";

                } else {

                    output.innerHTML += `
                        <pre>${data.result}</pre>
                    `;
                }

                input.value = "";

                output.scrollTop =
                    output.scrollHeight;
            }
        });

        // =====================
        // LOAD HISTORY WIDGETS
        // =====================

        async function loadWidgets() {

            const response =
                await fetch("/history-data");

            const files =
                await response.json();

            const container =
                document.getElementById(
                    "history-container"
                );

            container.innerHTML = "";

            files.forEach(file => {

                const widget =
                    document.createElement("div");

                widget.className =
                    "history-widget";

                widget.innerText =
                    file.replace(".json", "");

                widget.onclick = () => {

                    loadDay(file);

                };

                container.appendChild(widget);
            });
        }

        // =====================
        // LOAD SPECIFIC DAY
        // =====================

        async function loadDay(file) {

            const response =
                await fetch(`/day/${file}`);

            const data =
                await response.json();

            output.innerHTML = "";

            data.forEach((track, index) => {

                output.innerHTML += `
                    <p>
                        ${index + 1}.
                        ${track.song} - ${track.artist}
                    </p>
                `;
            });
        }

        // AUTO LOAD WIDGETS
        loadWidgets();

    </script>

</body>

</html>
